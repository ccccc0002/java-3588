name: tdd-gate

on:
  push:
    branches:
      - main
      - "feature/**"
      - "feat/**"
      - "fix/**"
  pull_request:

jobs:
  unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Run unit tests
        run: mvn -B -ntp test

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/**
